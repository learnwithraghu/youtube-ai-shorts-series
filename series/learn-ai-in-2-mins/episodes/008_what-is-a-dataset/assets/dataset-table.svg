<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Table Header -->
  <rect x="5" y="15" width="110" height="20" rx="4" fill="#818cf8" />
  <text x="15" y="28" fill="#0f172a" font-size="6.5" font-family="sans-serif" font-weight="bold">TEXT (Input)</text>
  <text x="85" y="28" fill="#0f172a" font-size="6.5" font-family="sans-serif" font-weight="bold">LABEL (Output)</text>

  <!-- Row 1 -->
  <rect x="5" y="40" width="110" height="22" rx="4" fill="rgba(148, 163, 184, 0.08)" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1" />
  <text x="15" y="53" fill="#f8fafc" font-size="5.5" font-family="sans-serif">"Loved this movie!"</text>
  <!-- Label Badge -->
  <rect x="80" y="44" width="30" height="14" rx="7" fill="rgba(52, 211, 153, 0.15)" stroke="#34d399" stroke-width="1" />
  <text x="95" y="53" text-anchor="middle" fill="#34d399" font-size="5.5" font-family="sans-serif" font-weight="bold">Positive</text>

  <!-- Row 2 -->
  <rect x="5" y="67" width="110" height="22" rx="4" fill="rgba(148, 163, 184, 0.08)" stroke="rgba(148, 163, 184, 0.2)" stroke-width="1" />
  <text x="15" y="80" fill="#f8fafc" font-size="5.5" font-family="sans-serif">"Waste of time."</text>
  <!-- Label Badge -->
  <rect x="80" y="71" width="30" height="14" rx="7" fill="rgba(248, 113, 113, 0.15)" stroke="#f87171" stroke-width="1" />
  <text x="95" y="80" text-anchor="middle" fill="#f87171" font-size="5.5" font-family="sans-serif" font-weight="bold">Negative</text>

  <!-- Dots for more rows -->
  <circle cx="60" cy="98" r="2" fill="#94a3b8" />
  <circle cx="60" cy="104" r="2" fill="#94a3b8" />
  <circle cx="60" cy="110" r="2" fill="#94a3b8" />
</svg>
