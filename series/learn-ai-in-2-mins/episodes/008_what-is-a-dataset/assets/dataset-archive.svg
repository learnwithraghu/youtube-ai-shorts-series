<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Glowing Background -->
  <circle cx="60" cy="65" r="40" fill="rgba(52, 211, 153, 0.1)" filter="blur(8px)" />

  <!-- Data filing cabinet / container structure -->
  <rect x="25" y="25" width="70" height="75" rx="8" fill="#0f172a" stroke="#475569" stroke-width="2" />
  
  <!-- Drawer 1 (Label: Texts) -->
  <g transform="translate(32, 33)">
    <rect x="0" y="0" width="56" height="16" rx="4" fill="rgba(129, 140, 248, 0.12)" stroke="#818cf8" stroke-width="1.5" />
    <circle cx="8" cy="8" r="3" fill="#818cf8" />
    <text x="18" y="11" fill="#f8fafc" font-size="6" font-family="sans-serif" font-weight="bold">TEXTS (Books, Web)</text>
  </g>

  <!-- Drawer 2 (Label: Images) -->
  <g transform="translate(32, 54)">
    <rect x="0" y="0" width="56" height="16" rx="4" fill="rgba(248, 113, 113, 0.12)" stroke="#f87171" stroke-width="1.5" />
    <circle cx="8" cy="8" r="3" fill="#f87171" />
    <text x="18" y="11" fill="#f8fafc" font-size="6" font-family="sans-serif" font-weight="bold">IMAGES (Labeled)</text>
  </g>

  <!-- Drawer 3 (Label: Code) -->
  <g transform="translate(32, 75)">
    <rect x="0" y="0" width="56" height="16" rx="4" fill="rgba(52, 211, 153, 0.12)" stroke="#34d399" stroke-width="1.5" />
    <circle cx="8" cy="8" r="3" fill="#34d399" />
    <text x="18" y="11" fill="#f8fafc" font-size="6" font-family="sans-serif" font-weight="bold">CODE (Python, JS)</text>
  </g>
</svg>
