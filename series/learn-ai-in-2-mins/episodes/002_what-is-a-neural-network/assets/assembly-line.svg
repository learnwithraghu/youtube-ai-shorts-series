<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 1.5 L 7 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
  </defs>
  <!-- Conveyor belt base -->
  <rect x="10" y="70" width="100" height="10" rx="5" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <!-- Conveyor rollers -->
  <circle cx="20" cy="75" r="3" fill="#94a3b8" />
  <circle cx="40" cy="75" r="3" fill="#94a3b8" />
  <circle cx="60" cy="75" r="3" fill="#94a3b8" />
  <circle cx="80" cy="75" r="3" fill="#94a3b8" />
  <circle cx="100" cy="75" r="3" fill="#94a3b8" />
  
  <!-- Station 1 (Edge detection) -->
  <g transform="translate(15, 25)">
    <rect x="0" y="0" width="22" height="30" rx="4" fill="rgba(129, 140, 248, 0.1)" stroke="#818cf8" stroke-width="1.5" />
    <path d="M 5 22 L 17 8" stroke="#818cf8" stroke-width="2" stroke-linecap="round" />
    <text x="11" y="-4" text-anchor="middle" fill="#818cf8" font-size="5" font-family="sans-serif">Edges</text>
  </g>

  <!-- Connection Arrow 1 -->
  <path d="M 40 40 L 46 40" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" fill="none" />

  <!-- Station 2 (Shape detection) -->
  <g transform="translate(50, 25)">
    <rect x="0" y="0" width="22" height="30" rx="4" fill="rgba(248, 113, 113, 0.1)" stroke="#f87171" stroke-width="1.5" />
    <circle cx="11" cy="15" r="6" fill="none" stroke="#f87171" stroke-width="2" />
    <text x="11" y="-4" text-anchor="middle" fill="#f87171" font-size="5" font-family="sans-serif">Shapes</text>
  </g>

  <!-- Connection Arrow 2 -->
  <path d="M 75 40 L 81 40" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" fill="none" />

  <!-- Station 3 (Object / Output) -->
  <g transform="translate(85, 25)">
    <rect x="0" y="0" width="22" height="30" rx="4" fill="rgba(52, 211, 153, 0.1)" stroke="#34d399" stroke-width="1.5" />
    <!-- Simple cat face outline -->
    <path d="M 6 18 L 6 12 L 9 15 L 13 15 L 16 12 L 16 18 Z" fill="none" stroke="#34d399" stroke-width="1.5" />
    <text x="11" y="-4" text-anchor="middle" fill="#34d399" font-size="5" font-family="sans-serif">Object</text>
  </g>
</svg>
