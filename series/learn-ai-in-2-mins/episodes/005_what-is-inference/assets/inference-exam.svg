<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Exam Paper outline -->
  <rect x="25" y="20" width="70" height="80" rx="8" fill="#0f172a" stroke="#818cf8" stroke-width="2" />
  
  <!-- Exam Header -->
  <text x="35" y="36" fill="#f8fafc" font-size="7" font-family="sans-serif" font-weight="bold">EXAM: AI Model</text>
  <line x1="35" y1="42" x2="85" y2="42" stroke="#475569" stroke-width="1.5" />
  
  <!-- Question & Answer -->
  <text x="35" y="55" fill="#94a3b8" font-size="6" font-family="sans-serif">Q: What is 2+2?</text>
  
  <rect x="33" y="62" width="54" height="14" rx="4" fill="rgba(52, 211, 153, 0.1)" stroke="#34d399" stroke-width="1.2" />
  <text x="38" y="71" fill="#34d399" font-size="7" font-family="sans-serif" font-weight="bold">A: 4 (Predicted)</text>
  
  <!-- A+ Stamp / Score -->
  <circle cx="82" cy="80" r="12" fill="none" stroke="#f87171" stroke-width="2.5" stroke-dasharray="2,2" transform="rotate(-15, 82, 80)" />
  <text x="82" y="84" text-anchor="middle" fill="#f87171" font-size="12" font-family="sans-serif" font-weight="bold" transform="rotate(-15, 82, 80)">A+</text>
</svg>
