episode:
  id: "005"
  slug: what-is-inference
  title: "What is Inference?"
  targetDurationMs: 90000
  series: "Learn AI in 2 Mins"
  tone: "simple metaphor + infographic"
  wordCount: 214
  templateRefs:
    welcome: "../../templates/welcome.yaml"
    outro: "../../templates/outro.yaml"

scenes:
  - id: welcome
    type: series_intro
    durationMs: 6000
    voiceover: >
      Welcome to Learn AI in 2 Mins — quick concepts, simple metaphors, zero jargon overload.
    captions:
      - text: "Welcome to Learn AI in 2 Mins"
        startMs: 0
        endMs: 2800
      - text: "Quick concepts. Simple metaphors."
        startMs: 2800
        endMs: 6000
    visual:
      layout: branded_card
      background: gradient_dark_blue
      elements:
        - type: icon
          asset: lightbulb_brain
          animation: scaleIn
        - type: title
          text: "Learn AI in 2 Mins"
          animation: fadeIn
        - type: subtitle
          text: "Quick concepts. Simple metaphors."
          animation: slideUp

  - id: hook
    type: question_hook
    durationMs: 8000
    voiceover: >
      Training is done. Now the model is actually used. That phase has a name — inference.
    captions:
      - text: "Training is finished."
        startMs: 0
        endMs: 3200
      - text: "What happens next? Inference."
        startMs: 3200
        endMs: 8000
    visual:
      layout: split
      background: dark_slate
      left:
        type: icon
        asset: arrow_right
        animation: scaleIn
      right:
        type: headline
        text: "What happens next? Inference."
        animation: slideLeft
      elements:
        - type: label
          text: "Episode 005"
          animation: fadeIn
          style: badge_top_right

  - id: metaphor_core
    type: concept_explain
    durationMs: 54000
    voiceover: >
      If training is studying for an exam, inference is exam day. The model finished learning — its settings are locked in. Now you give it something new it has never seen: a fresh photo, a new question, a voice clip. The model runs forward through its layers and produces an answer. No adjusting, no learning — just applying what it already knows. Every ChatGPT reply you get? That's inference. Every face detected in your camera? Inference. Training happens once in a data center. Inference happens billions of times when real people use the product. Fast inference = good user experience.
    captions:
      - text: "Training is studying for an exam."
        startMs: 0
        endMs: 4500
      - text: "Inference is exam day."
        startMs: 4500
        endMs: 8000
      - text: "Model finished learning."
        startMs: 8000
        endMs: 11500
      - text: "Settings are locked in."
        startMs: 11500
        endMs: 14500
      - text: "Give it something new."
        startMs: 14500
        endMs: 17500
      - text: "A fresh photo. A new question."
        startMs: 17500
        endMs: 21500
      - text: "Model runs forward → answer."
        startMs: 21500
        endMs: 25500
      - text: "No adjusting. No learning."
        startMs: 25500
        endMs: 29000
      - text: "Just applying what it knows."
        startMs: 29000
        endMs: 32500
      - text: "Every ChatGPT reply = inference."
        startMs: 32500
        endMs: 37000
      - text: "Training once. Inference billions of times."
        startMs: 37000
        endMs: 43000
      - text: "Fast inference = great UX."
        startMs: 43000
        endMs: 54000
    visual:
      layout: infographic_stack
      background: gradient_purple_blue
      metaphor: "Exam day after studying — apply knowledge to new questions"
      elements:
        - type: headline
          text: "Inference = Using What You Learned"
          animation: fadeIn
      steps:
        - label: "Model is fully trained & locked"
          icon: keyboard
          animation: slideUp
          startMs: 0
        - label: "New input arrives"
          icon: arrow_right
          animation: slideUp
          startMs: 9000
        - label: "Model runs forward → prediction"
          icon: loop
          animation: slideUp
          startMs: 18000
        - label: "No learning — just answering"
          icon: chat_bubble_complete
          animation: slideUp
          startMs: 37000
      callout:
        text: "Training learns. Inference applies."
        style: highlight_red

  - id: recap
    type: key_takeaway
    durationMs: 12000
    voiceover: >
      Inference is using a trained model on new data — no more learning, just fast predictions when users actually need answers.
    captions:
      - text: "Trained model, locked settings"
        startMs: 0
        endMs: 4500
      - text: "New input → prediction"
        startMs: 4500
        endMs: 8500
      - text: "No learning — just answering"
        startMs: 8500
        endMs: 12000
    visual:
      layout: summary_card
      background: dark_slate
      bullets:
        - "Uses trained model"
        - "Runs on new inputs"
        - "Happens at scale in production"
      elements:
        - type: title
          text: "Key Takeaway"
          animation: fadeIn
        - type: badge
          text: "Inference = Exam Day"
          animation: highlight

  - id: outro
    type: series_outro
    durationMs: 10000
    voiceover: >
      That's your concept for today. Follow for the next one — Learn AI in 2 Mins.
    captions:
      - text: "That's your concept for today."
        startMs: 0
        endMs: 3500
      - text: "Follow for the next one"
        startMs: 3500
        endMs: 6500
      - text: "Learn AI in 2 Mins"
        startMs: 6500
        endMs: 10000
    visual:
      layout: branded_card
      background: gradient_dark_blue
      elements:
        - type: cta
          text: "Follow for the next concept"
          animation: pulse
        - type: title
          text: "Learn AI in 2 Mins"
          animation: fadeIn
        - type: badge
          text: "Next: What is a Token?"
          animation: slideUp
