<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Coordinate Axis -->
  <line x1="15" y1="105" x2="15" y2="15" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  <line x1="15" y1="105" x2="105" y2="105" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  <line x1="15" y1="105" x2="80" y2="40" stroke="#475569" stroke-width="1.5" stroke-dasharray="2,2" stroke-linecap="round" /> <!-- Z axis representation -->

  <!-- Word clusters -->
  
  <!-- Cluster 1: Royalty (King & Queen close) -->
  <g transform="translate(75, 30)">
    <circle cx="0" cy="0" r="15" fill="rgba(129, 140, 248, 0.1)" stroke="#818cf8" stroke-width="1" stroke-dasharray="2,2" />
    <circle cx="-4" cy="-3" r="3" fill="#818cf8" />
    <text x="-4" y="-8" fill="#f8fafc" font-size="5" font-family="sans-serif" text-anchor="middle">King</text>
    
    <circle cx="5" cy="4" r="3" fill="#818cf8" />
    <text x="5" y="11" fill="#f8fafc" font-size="5" font-family="sans-serif" text-anchor="middle">Queen</text>
    
    <line x1="-4" y1="-3" x2="5" y2="4" stroke="#a5b4fc" stroke-width="1" />
  </g>
  
  <!-- Cluster 2: Fruit (Banana far away) -->
  <g transform="translate(35, 75)">
    <circle cx="0" cy="0" r="12" fill="rgba(248, 113, 113, 0.1)" stroke="#f87171" stroke-width="1" stroke-dasharray="2,2" />
    <circle cx="2" cy="-2" r="3" fill="#f87171" />
    <text x="2" y="-7" fill="#f8fafc" font-size="5" font-family="sans-serif" text-anchor="middle">Banana</text>
    
    <circle cx="-5" cy="3" r="3" fill="#f87171" />
    <text x="-5" y="10" fill="#f8fafc" font-size="5" font-family="sans-serif" text-anchor="middle">Apple</text>
  </g>

  <!-- Vector distance indicator line between clusters -->
  <path d="M 60 45 Q 45 50 37 68" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3" />
  <text x="53" y="60" fill="#fbbf24" font-size="5" font-family="sans-serif">Far</text>
</svg>
