<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Grid Axes -->
  <line x1="15" y1="105" x2="105" y2="105" stroke="rgba(148, 163, 184, 0.4)" stroke-width="2" />
  <line x1="15" y1="15" x2="15" y2="105" stroke="rgba(148, 163, 184, 0.4)" stroke-width="2" />
  
  <!-- Dashed grid lines -->
  <line x1="45" y1="15" x2="45" y2="105" stroke="rgba(148, 163, 184, 0.15)" stroke-dasharray="2,2" />
  <line x1="75" y1="15" x2="75" y2="105" stroke="rgba(148, 163, 184, 0.15)" stroke-dasharray="2,2" />
  <line x1="15" y1="45" x2="105" y2="45" stroke="rgba(148, 163, 184, 0.15)" stroke-dasharray="2,2" />
  <line x1="15" y1="75" x2="105" y2="75" stroke="rgba(148, 163, 184, 0.15)" stroke-dasharray="2,2" />

  <!-- Semantic cluster: Royal (King & Queen) -->
  <!-- King -->
  <circle cx="75" cy="35" r="5" fill="#818cf8" />
  <text x="75" y="27" text-anchor="middle" fill="#818cf8" font-size="6" font-family="sans-serif" font-weight="bold">King [0.8, 0.9]</text>
  
  <!-- Queen -->
  <circle cx="85" cy="42" r="5" fill="#818cf8" />
  <text x="85" y="52" text-anchor="middle" fill="#818cf8" font-size="6" font-family="sans-serif" font-weight="bold">Queen [0.8, 0.7]</text>

  <!-- Distance Indicator between King & Queen -->
  <line x1="75" y1="35" x2="85" y2="42" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="1,1" />

  <!-- Outlier: Banana -->
  <circle cx="35" cy="80" r="5" fill="#f87171" />
  <text x="35" y="73" text-anchor="middle" fill="#f87171" font-size="6" font-family="sans-serif" font-weight="bold">Banana [0.2, 0.1]</text>
</svg>
