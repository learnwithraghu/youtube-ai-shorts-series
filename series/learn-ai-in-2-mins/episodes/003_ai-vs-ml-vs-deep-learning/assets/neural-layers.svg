<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Connections Layer 1 to 2 -->
  <line x1="15" y1="25" x2="40" y2="15" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1.5" />
  <line x1="15" y1="25" x2="40" y2="40" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1.5" />
  <line x1="15" y1="25" x2="40" y2="65" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1.5" />
  
  <line x1="15" y1="55" x2="40" y2="15" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1.5" />
  <line x1="15" y1="55" x2="40" y2="40" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1.5" />
  <line x1="15" y1="55" x2="40" y2="65" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1.5" />
  
  <!-- Connections Layer 2 to 3 -->
  <line x1="40" y1="15" x2="65" y2="30" stroke="rgba(129, 140, 248, 0.4)" stroke-width="1.5" />
  <line x1="40" y1="15" x2="65" y2="50" stroke="rgba(129, 140, 248, 0.4)" stroke-width="1.5" />
  
  <line x1="40" y1="40" x2="65" y2="30" stroke="rgba(129, 140, 248, 0.4)" stroke-width="1.5" />
  <line x1="40" y1="40" x2="65" y2="50" stroke="rgba(129, 140, 248, 0.4)" stroke-width="1.5" />
  
  <line x1="40" y1="65" x2="65" y2="30" stroke="rgba(129, 140, 248, 0.4)" stroke-width="1.5" />
  <line x1="40" y1="65" x2="65" y2="50" stroke="rgba(129, 140, 248, 0.4)" stroke-width="1.5" />

  <!-- Nodes Layer 1 (Input) -->
  <circle cx="15" cy="25" r="5" fill="#94a3b8" />
  <circle cx="15" cy="55" r="5" fill="#94a3b8" />
  
  <!-- Nodes Layer 2 (Hidden) -->
  <circle cx="40" cy="15" r="6" fill="#818cf8" />
  <circle cx="40" cy="40" r="6" fill="#818cf8" />
  <circle cx="40" cy="65" r="6" fill="#818cf8" />
  
  <!-- Nodes Layer 3 (Output) -->
  <circle cx="65" cy="30" r="5" fill="#f87171" />
  <circle cx="65" cy="50" r="5" fill="#f87171" />
</svg>
