<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Central Circular Loop Path -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="rgba(148, 163, 184, 0.25)" stroke-width="2.5" stroke-dasharray="4,4" />
  
  <!-- Step 1: Input Data (Top) -->
  <circle cx="60" cy="20" r="11" fill="#94a3b8" />
  <text x="60" y="22" text-anchor="middle" fill="#0f172a" font-size="6" font-family="sans-serif" font-weight="bold">DATA</text>
  
  <!-- Step 2: Predict (Right) -->
  <circle cx="100" cy="60" r="11" fill="#818cf8" />
  <text x="100" y="62" text-anchor="middle" fill="#f8fafc" font-size="5" font-family="sans-serif" font-weight="bold">PREDICT</text>
  
  <!-- Step 3: Loss/Error Check (Bottom) -->
  <circle cx="60" cy="100" r="11" fill="#f87171" />
  <text x="60" y="102" text-anchor="middle" fill="#f8fafc" font-size="6" font-family="sans-serif" font-weight="bold">LOSS</text>
  
  <!-- Step 4: Adjust Weights (Left) -->
  <circle cx="20" cy="60" r="11" fill="#34d399" />
  <text x="20" y="62" text-anchor="middle" fill="#0f172a" font-size="5" font-family="sans-serif" font-weight="bold">ADJUST</text>

  <!-- Curving Arrows -->
  <path d="M 68 28 A 38 38 0 0 1 92 52" fill="none" stroke="#818cf8" stroke-width="2" />
  <path d="M 92 68 A 38 38 0 0 1 68 92" fill="none" stroke="#a5b4fc" stroke-width="2" />
  <path d="M 52 92 A 38 38 0 0 1 28 68" fill="none" stroke="#f87171" stroke-width="2" />
  <path d="M 28 52 A 38 38 0 0 1 52 28" fill="none" stroke="#34d399" stroke-width="2" />
</svg>
