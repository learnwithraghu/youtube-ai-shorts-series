episode:
  id: "004"
  slug: what-is-training
  title: "What is Training?"
  targetDurationMs: 90000
  series: "Learn AI in 2 Mins"
  tone: "simple metaphor + infographic"
  wordCount: 216
  templateRefs:
    welcome: "../../templates/welcome.yaml"
    outro: "../../templates/outro.yaml"

scenes:
  - id: welcome
    type: series_intro
    durationMs: 6000
    voiceover: >
      Welcome to Learn AI in 2 Mins — quick concepts, simple metaphors, zero jargon overload.
    captions:
      - text: "Welcome to Learn AI in 2 Mins"
        startMs: 0
        endMs: 2800
      - text: "Quick concepts. Simple metaphors."
        startMs: 2800
        endMs: 6000
    visual:
      layout: branded_card
      background: gradient_dark_blue
      elements:
        - type: icon
          asset: lightbulb_brain
          animation: scaleIn
        - type: title
          text: "Learn AI in 2 Mins"
          animation: fadeIn
        - type: subtitle
          text: "Quick concepts. Simple metaphors."
          animation: slideUp

  - id: hook
    type: question_hook
    durationMs: 8000
    voiceover: >
      Every AI model goes through training. But what does that actually mean?
    captions:
      - text: "Every AI model gets trained."
        startMs: 0
        endMs: 3200
      - text: "But what IS training?"
        startMs: 3200
        endMs: 8000
    visual:
      layout: split
      background: dark_slate
      left:
        type: icon
        asset: training-flashcards.svg
        animation: scaleIn
      right:
        type: headline
        text: "But what IS training"
        animation: slideLeft
      elements:
        - type: label
          text: "Episode 004"
          animation: fadeIn
          style: badge_top_right

  - id: metaphor_core
    type: concept_explain
    durationMs: 54000
    voiceover: >
      Training an AI is like learning to ride a bike. At first, the model is terrible — random guesses. You show it thousands of examples — photos labeled cat or dog, questions with answers. It predicts, checks how wrong it was, and adjusts internal settings slightly. Then tries again. And again. Millions of times. Each round, it gets a little less wrong. That's the key — it's not memorizing every example. It's adjusting internal knobs until its predictions match the training data. Training is the expensive, compute-heavy phase where the model actually learns. No training, no intelligence.
    captions:
      - text: "Training is like learning to ride a bike."
        startMs: 0
        endMs: 4500
      - text: "At first — random guesses."
        startMs: 4500
        endMs: 8000
      - text: "Show thousands of labeled examples."
        startMs: 8000
        endMs: 12500
      - text: "Photos: cat or dog."
        startMs: 12500
        endMs: 15500
      - text: "Model predicts, checks how wrong."
        startMs: 15500
        endMs: 19500
      - text: "Adjusts internal settings slightly."
        startMs: 19500
        endMs: 23500
      - text: "Then tries again. And again."
        startMs: 23500
        endMs: 27500
      - text: "Millions of rounds."
        startMs: 27500
        endMs: 31000
      - text: "Each round — a little less wrong."
        startMs: 31000
        endMs: 35000
      - text: "Not memorizing every example."
        startMs: 35000
        endMs: 39000
      - text: "Adjusting knobs until predictions fit."
        startMs: 39000
        endMs: 44000
      - text: "No training, no intelligence."
        startMs: 44000
        endMs: 54000
    visual:
      layout: center_svg
      centerAsset: training-loop.svg
      background: gradient_purple_blue
      metaphor: "Learning to ride a bike — fall, adjust, try again"
      elements:
        - type: headline
          text: "Training = Learn by Trial and Error"
          animation: fadeIn
      steps:
        - label: "1. Random Guesses"
          icon: keyboard
          animation: slideUp
          startMs: 0
        - label: "2. Show Examples"
          icon: arrow_right
          animation: slideUp
          startMs: 9000
        - label: "3. Measure & Adjust"
          icon: loop
          animation: slideUp
          startMs: 18000
        - label: "4. Repeat Loop"
          icon: chat_bubble_complete
          animation: slideUp
          startMs: 37000
      callout:
        text: "Not memorizing — adjusting until less wrong."
        style: highlight_red

  - id: recap
    type: key_takeaway
    durationMs: 12000
    voiceover: >
      Training means showing examples, measuring errors, and adjusting the model over and over until it learns patterns — not facts by heart.
    captions:
      - text: "Show examples, measure errors"
        startMs: 0
        endMs: 4500
      - text: "Adjust model repeatedly"
        startMs: 4500
        endMs: 8500
      - text: "Learns patterns — not memorization"
        startMs: 8500
        endMs: 12000
    visual:
      layout: summary_card
      background: dark_slate
      bullets:
        - "Starts with bad guesses"
        - "Adjusts from labeled data"
        - "Repeats until accurate"
      elements:
        - type: title
          text: "Key Takeaway"
          animation: fadeIn
        - type: badge
          text: "Training = Trial & Error"
          animation: highlight

  - id: outro
    type: series_outro
    durationMs: 10000
    voiceover: >
      That's your concept for today. Follow for the next one — Learn AI in 2 Mins.
    captions:
      - text: "That's your concept for today."
        startMs: 0
        endMs: 3500
      - text: "Follow for the next one"
        startMs: 3500
        endMs: 6500
      - text: "Learn AI in 2 Mins"
        startMs: 6500
        endMs: 10000
    visual:
      layout: branded_card
      background: gradient_dark_blue
      elements:
        - type: cta
          text: "Follow for the next concept"
          animation: pulse
        - type: title
          text: "Learn AI in 2 Mins"
          animation: fadeIn
        - type: badge
          text: "Next: What is Inference?"
          animation: slideUp
