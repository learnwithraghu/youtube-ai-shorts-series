scenes:
  - id: welcome
    type: series_intro
    durationMs: 6000
    voiceover: >
      Welcome to Learn AI in 2 Mins — quick concepts, simple metaphors, zero jargon overload.
    captions:
      - text: "Welcome to Learn AI in 2 Mins"
        startMs: 0
        endMs: 2800
      - text: "Quick concepts. Simple metaphors."
        startMs: 2800
        endMs: 6000
    visual:
      layout: branded_card
      background: gradient_dark_blue
      elements:
        - type: icon
          asset: lightbulb_brain
          animation: scaleIn
        - type: title
          text: "Learn AI in 2 Mins"
          animation: fadeIn
        - type: subtitle
          text: "Quick concepts. Simple metaphors."
          animation: slideUp

  - id: hook
    type: question_hook
    durationMs: 8000
    voiceover: >
      GPT has 175 billion parameters. Claude has billions too. What does that even mean?
    captions:
      - text: "Billions of parameters?"
        startMs: 0
        endMs: 3200
      - text: "What does that mean?"
        startMs: 3200
        endMs: 8000
    visual:
      layout: split
      background: dark_slate
      left:
        type: icon
        asset: loop
        animation: scaleIn
      right:
        type: headline
        text: "What does that mean"
        animation: slideLeft
      elements:
        - type: label
          text: "Episode 009"
          animation: fadeIn
          style: badge_top_right

  - id: metaphor_core
    type: concept_explain
    durationMs: 54000
    voiceover: >
      A parameter is a single number inside the model that gets adjusted during training — like a tiny dial on a massive mixing board. Early on, all dials are set randomly. Training turns each dial bit by bit until the model's outputs look right. GPT-3 had 175 billion of these dials. More parameters generally mean more capacity to learn complex patterns — but also more compute and data needed. Parameters aren't facts stored like a database. They're the tuned settings that shape how input flows to output. When people say a model has 7B or 70B parameters, they mean 7 or 70 billion learned numbers inside.
    captions:
      - text: "A parameter is one learned number."
        startMs: 0
        endMs: 4000
      - text: "Like a tiny dial on a mixing board."
        startMs: 4000
        endMs: 8000
      - text: "All dials start random."
        startMs: 8000
        endMs: 11500
      - text: "Training turns each dial bit by bit."
        startMs: 11500
        endMs: 15500
      - text: "Until outputs look right."
        startMs: 15500
        endMs: 19000
      - text: "GPT-3: 175 billion dials."
        startMs: 19000
        endMs: 23000
      - text: "More params = more capacity."
        startMs: 23000
        endMs: 27000
      - text: "But needs more data & compute."
        startMs: 27000
        endMs: 31000
      - text: "Not facts in a database."
        startMs: 31000
        endMs: 34500
      - text: "Tuned settings shaping input → output."
        startMs: 34500
        endMs: 39000
      - text: "7B = 7 billion learned numbers."
        startMs: 39000
        endMs: 43000
      - text: "Parameters = what training creates."
        startMs: 43000
        endMs: 54000
    visual:
      layout: infographic_stack
      background: gradient_purple_blue
      metaphor: "Internal knobs and dials adjusted during training"
      elements:
        - type: headline
          text: "Parameter = Learned Knob"
          animation: fadeIn
      steps:
        - label: "Model starts with random numbers"
          icon: keyboard
          animation: slideUp
          startMs: 0
        - label: "Training adjusts each dial"
          icon: arrow_right
          animation: slideUp
          startMs: 9000
        - label: "Billions of settings tuned"
          icon: loop
          animation: slideUp
          startMs: 18000
        - label: "7B / 70B = dial count"
          icon: chat_bubble_complete
          animation: slideUp
          startMs: 37000
      callout:
        text: "Not stored facts — tuned settings."
        style: highlight_red

  - id: recap
    type: key_takeaway
    durationMs: 12000
