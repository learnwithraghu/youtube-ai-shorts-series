<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Knob 1 (Dial) -->
  <g transform="translate(30, 60)">
    <circle cx="0" cy="0" r="22" fill="rgba(129, 140, 248, 0.12)" stroke="#818cf8" stroke-width="2" />
    <circle cx="0" cy="0" r="16" fill="rgba(15, 23, 42, 0.6)" stroke="#a5b4fc" stroke-width="1.5" />
    <!-- Indicator line -->
    <line x1="0" y1="0" x2="-11" y2="-11" stroke="#34d399" stroke-width="3" stroke-linecap="round" />
    <text x="0" y="34" text-anchor="middle" fill="#94a3b8" font-size="6.5" font-family="sans-serif" font-weight="bold">WEIGHT</text>
  </g>

  <!-- Knob 2 (Slider) -->
  <g transform="translate(90, 60)">
    <!-- Track -->
    <rect x="-4" y="-22" width="8" height="44" rx="4" fill="rgba(148, 163, 184, 0.2)" stroke="rgba(148, 163, 184, 0.4)" stroke-width="1" />
    <!-- Slider Handle -->
    <rect x="-8" y="-4" width="16" height="8" rx="2" fill="#f87171" stroke="#f8fafc" stroke-width="1" />
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#f8fafc" stroke-width="1" />
    <text x="0" y="34" text-anchor="middle" fill="#94a3b8" font-size="6.5" font-family="sans-serif" font-weight="bold">BIAS</text>
  </g>
</svg>
