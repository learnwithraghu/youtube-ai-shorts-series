<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Text Input Container -->
  <rect x="5" y="10" width="110" height="50" rx="10" fill="none" stroke="#818cf8" stroke-width="2" />
  
  <!-- Spoken/Typed Text -->
  <text x="15" y="32" fill="#f8fafc" font-size="7" font-family="sans-serif" font-weight="bold">The quick brown fox</text>
  
  <!-- Autocomplete Suggestions -->
  <g transform="translate(0, 50)">
    <!-- Option 1 (Selected/Glowing) -->
    <rect x="10" y="20" width="30" height="16" rx="4" fill="rgba(129, 140, 248, 0.25)" stroke="#a5b4fc" stroke-width="1.5" />
    <text x="25" y="30" text-anchor="middle" fill="#a5b4fc" font-size="6" font-family="sans-serif" font-weight="bold">jumps</text>
    
    <!-- Option 2 -->
    <rect x="45" y="20" width="30" height="16" rx="4" fill="rgba(15, 23, 42, 0.5)" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1" />
    <text x="60" y="30" text-anchor="middle" fill="#94a3b8" font-size="6" font-family="sans-serif">runs</text>
    
    <!-- Option 3 -->
    <rect x="80" y="20" width="30" height="16" rx="4" fill="rgba(15, 23, 42, 0.5)" stroke="rgba(148, 163, 184, 0.3)" stroke-width="1" />
    <text x="95" y="30" text-anchor="middle" fill="#94a3b8" font-size="6" font-family="sans-serif">sleeps</text>
  </g>
</svg>
