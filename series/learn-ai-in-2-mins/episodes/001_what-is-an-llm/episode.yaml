  - id: metaphor_core
    type: concept_explain
    durationMs: 41916
    voiceover: >
      Think of an LLM like autocomplete on steroids. You type a few words — your phone suggests the next one. An LLM
      does the same thing, but at massive scale. It was trained on billions of words from books, articles, and the web.
      It learned patterns — how words usually follow other words. So when you ask a question, it doesn't look things up.
      It predicts the most likely next word, then the next, and the next — until it forms a full answer. It's not a
      search engine. It's not a human brain. It's a pattern-prediction machine — and that's what makes it so powerful.
